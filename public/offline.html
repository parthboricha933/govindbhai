<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Sadvichar Surgery Records</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2rem;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #0f766e;
      color: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 32px;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }
    p {
      margin: 0 0 1.5rem;
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    button {
      background: #0f766e;
      color: white;
      border: 0;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #115e59; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .card { background: #1e293b; border-color: #334155; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">+</div>
    <h1>You're offline</h1>
    <p>
      The Sadvichar Surgery Records app needs an internet connection to load
      fresh data. Please reconnect to continue. Any records you previously
      viewed are still cached.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
